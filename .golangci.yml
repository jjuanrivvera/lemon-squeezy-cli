version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unparam
    - unused
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - bodyclose # dry-run calls return a nil response; nothing to close

formatters:
  enable:
    - gofmt
