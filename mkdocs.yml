site_name: lsqueezy
site_description: A polished command-line interface for the Lemon Squeezy API
site_url: https://jjuanrivvera.github.io/lemon-squeezy-cli/
repo_url: https://github.com/jjuanrivvera/lemon-squeezy-cli
repo_name: jjuanrivvera/lemon-squeezy-cli
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: yellow
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: yellow
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Authentication: getting-started/authentication.md
      - First Call: getting-started/first-call.md
  - User Guide:
      - Output & Filtering: user-guide/output-and-filtering.md
      - Accounts & Configuration: user-guide/accounts-and-config.md
      - Creating & Updating: user-guide/writing-data.md
      - AI Agents (MCP & Guard): user-guide/agents.md
  - Command Reference: commands/index.md
