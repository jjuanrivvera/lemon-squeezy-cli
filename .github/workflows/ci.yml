# .github/workflows/ci.yml — copied into a generated CLI by cliwright (GOAL.md §6).
# Key trap: use the prebuilt gosec ACTION, not `go install` of a pinned old scanner
# (an old gosec/govulncheck won't compile under a newer Go toolchain).
name: CI
on:
  push: { branches: [main, develop] }
  pull_request:

permissions: { contents: read }

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      # install-mode: goinstall compiles golangci-lint with THIS job's Go (stable), so its
      # build-Go is never older than the module's `go` directive — the prebuilt binary lags
      # Go releases and refuses to run when go.mod targets a newer Go than it was built with.
      - uses: golangci/golangci-lint-action@v6
        with: { version: latest, install-mode: goinstall }
      - name: docs-gen drift check
        run: make docs-gen && git diff --exit-code -- docs/commands

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - name: govulncheck (blocking)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (high-severity gate, prebuilt action)
        uses: securego/gosec@v2.21.4
        with: { args: '-severity high -confidence medium ./...' }

  test:
    strategy:
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      # -coverpkg=./... credits cross-package integration tests (commands_test drives the
      # resources + api code), matching the Makefile's methodology — without it the gate
      # measures only same-package coverage and undercounts.
      - run: go test -race ./... -coverpkg=./... -coverprofile=coverage.out
      - name: coverage gate (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/cover-check.sh 80
      - if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      # syft must be on PATH for the SBOM step; the snapshot exercises the real release path
      # (archives + nfpm + sbom), only skipping sign (needs OIDC) and docker.
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with: { args: check }
      - uses: goreleaser/goreleaser-action@v6
        with: { args: release --snapshot --clean --skip=sign,docker }
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
