# .github/dependabot.yml — keeps GitHub Actions + Go deps current (grouped: one PR per
# ecosystem per week). Also the dependency-CVE early warning: a grouped bump PR lands before
# govulncheck goes red on a released dep.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-deps:
        patterns: ["*"]
